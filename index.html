<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Bird Flu Cattle</title>
    
    
    <script type="text/javascript" src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script type="text/javascript" src='plugins/leaflet/Leaflet.markercluster-1.4.1/dist/leaflet.markercluster.js'></script>
    <link rel="stylesheet" href="plugins/leaflet/Leaflet.markercluster-1.4.1/dist/MarkerCluster.css">
    <link rel="stylesheet" href="plugins/leaflet/Leaflet.markercluster-1.4.1/dist/MarkerCluster.Default.css">



        <!--bootstrap-->
    <link href="plugins/bootstrap-5.0.2-dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <script src="plugins/bootstrap-5.0.2-dist/js/bootstrap.bundle.min.js"></script>

    <!-- from https://jqueryui.com/download/ -->
    <link rel="stylesheet" href="plugins/jquery-ui/jquery-ui.css">


    <script src="plugins/jquery-ui/external/jquery/jquery.js"></script>
    <script src="plugins/jquery-ui/jquery-ui.js"></script>
     <script src="plugins/jquery/jquery.drawrpalette-min.js"></script>

     <script src="plugins/moment.js"></script>

    <script type="text/javascript" src="plugins/jquery/jquery.datetimepicker.js"></script>
    <script type="text/javascript" src="plugins/jquery/jquery.datetimepicker.full.min.js"></script>
    <link rel="stylesheet" href="plugins/jquery/jquery.datetimepicker.css">

    <script type="text/javascript" src="plugins/jquery/jquery.cookie.js"></script>

    <script src="plugins/jquery.csv.js"></script>


    <script src="plugins/rison.js"></script>

    <script src="js/index.js"></script>
     <script src="js/record_manager.js"></script>
     <script src="js/map_manager.js"></script>
      <script src="js/marker_manager.js"></script>
      <script src="js/layer_manager.js"></script>
      <script src="js/table_manager.js"></script>
     <script src="js/utils.js"></script>
    <script src="js/settings_config.js"></script>
    <link rel="stylesheet" href="css/style.css" />

    <script src="https://d3js.org/d3.v6.js"></script>


<body>
<div class="overlay">
<div class="progress">
<div id="loader" class="progress-bar progress-bar-success progress-bar-striped active bg-info" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width:0%;"><span id="current-progress"></span></div>
</div>
<br><br>
<div id="file_upload_controls" style="display:none;">Please choose a <strong>.csv</strong> and <strong>.geojson</strong> file to begin.<label class="form-label mt-3" for="data_input">Pen Movement and Map Data</label><input class="form-control" type="file" id="data_input" accept=".geojson,.csv" multiple></div>
</div>
<div class="dashboard">
<header class="dashboard-header card">
<div class="header-title"><h2>Bird Flu Cattle</h2><span class="dashboard-subtitle">Interactive Animal Movement Dashboard</span></div>
<div class="header-item"><span class="header-label">Data File</span><span id="data_file"></span></div>
<div class="header-item"><span class="header-label">Map File</span><span id="map_file"></span></div>
<div class="header-actions"><button class="btn btn-light" onclick="show_model()" title="Settings"><i class="bi bi-gear-fill"></i></button><a id="git_but" class="btn btn-light" href="https://github.com/GeospatialCentroid/bird_flu_cattle" target="_blank" title="GitHub Repository"><i class="bi bi-github"></i></a></div>
</header>
<div class="dashboard-main">
<section class="map-column"><div class="card map-card"><div id="map_wrapper"><div id="map"></div></div></div></section>
<aside class="sidebar-column">
<section class="card metrics-card"><div class="metric-grid">
  <div class="metric">
    <div class="metric-label">Unique Cows</div><div id="total_items" class="metric-value hyper"></div></div><div class="metric">
    <div class="metric-label">Duplicate Cows</div><div id="duplicate_items" class="metric-value hyper"></div></div></div>

    <div id="warning" class="warning-box"></div></section>
<section class="card"><div class="input-group"><input id="search" type="text" class="form-control" placeholder="Search by Cow ID"><button id="search_but" class="btn btn-primary"><i class="bi bi-search"></i></button></div></section>
<section class="card"><h6>Current Date</h6>
  
  
    <div class="date-input-wrapper">
              <input id="filter_current_date" class="date_field" type="text" placeholder="YYYY-MM-DD">
              <i class="bi bi-calendar-event"></i> </div>
    <div class="btn-group mt-2"><button id="date_advance_backward" class="btn btn-outline-secondary" onclick="record_manager.move_to_date(-1)"><i class="bi bi-arrow-left"></i></button><button id="date_advance_forward" class="btn btn-outline-secondary" onclick="record_manager.move_to_date(1)"><i class="bi bi-arrow-right"></i></button></div>
  </section>

  <div id="filter_date">

  <section class="card">
      <h6>Date Range</h6>

      <div class="date-row">
        <div class="date-input-group">
            <label for="filter_start_date">Start Date</label>
            <div class="date-input-wrapper">
            <input id="filter_start_date" class="date_field" type="text" placeholder="YYYY-MM-DD">
            <i class="bi bi-calendar-event"></i> </div>
        </div>

        <div class="date-input-group">
            <label for="filter_end_date">End Date</label>
            <div class="date-input-wrapper">
            <input id="filter_end_date" class="date_field" type="text" placeholder="YYYY-MM-DD">
            <i class="bi bi-calendar-event"></i> </div>

        </div>
    </div>

      <div class="filter_slider_box mt-3"></div>
  </section>

    <section class="card">
        <h6>Playback</h6>

        <div class="mb-2">
            <label>Speed</label>
            <select id="playback_speed_dropdown" class="form-select">
                <option value="0.5">0.5×</option>
                <option selected value="1">Normal</option>
                <option value="1.5">1.5×</option>
            </select>
        </div>

       

        <button class="btn btn-primary w-100 slider_toggle" onclick="record_manager.slider_toggle(this)">
            <i class="bi bi-play-fill"></i> Play Timeline
        </button>
    </section>

</div>
<section class="card"><h6>First Infection</h6><button id="date_first_infection" class="btn btn-outline-primary w-100"></button></section>
</aside>
</div>
<section class="card table-card"><div class="table-toolbar"><div class="table-stats"><div id="data_table_total"><div><span class="total_results"></span></div><div><span class="total_showing"></span></div></div></div><div class="table-actions"><div id="data_table_select"></div><button class="btn btn-outline-secondary" onclick="table_manager.download()" title="Download current results"><i class="bi bi-cloud-arrow-down"></i></button><button class="btn btn-outline-secondary" onclick="table_manager.download_all()" title="Download all records"><i class="bi bi-cloud-arrow-down-fill"></i></button><button class="btn btn-outline-secondary" onclick="table_manager.close()" title="Close"><i class="bi bi-x"></i></button></div></div><div id="data_table" class="dashboard-table"></div></section>
</div>
<div class="modal" tabindex="-1" role="dialog" id="model_data_config"><div class="modal-dialog" role="document"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Data Config</h5></div><div class="modal-body"><p>Please specify which columns to use:</p><form><div id="required_variables" class="d-flex flex-column gap-2"></div></form></div><div class="modal-footer"><button id="data_config_save_but" onclick="record_manager.data_config_set();" type="button" class="btn btn-primary">Submit</button></div></div></div></div>
<div class="modal fade custom-modal" id="model_data_form" style="z-index:99999999" tabindex="-1" data-bs-backdrop="true"><div class="modal-dialog" role="document"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="data_form_label">Track Events</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><label class="form-check-label font-weight-bold" for="init_filter_start_date">Start Date</label><input id="init_filter_start_date" type="text" class="date_field"/><span id="init_filter_date_to"></span><label class="form-check-label font-weight-bold" for="init_filter_end_date">End Date</label><input id="init_filter_end_date" type="text" class="date_field"/><label for="filter_id_checkbox">Filter by Cluster Color Event</label><input class="form-check-input" type="checkbox" value="" id="filter_id_checkbox"><div id="data_form"><div class="row"><input class="label" type="input" data="label"/><div class="col"><label for="start_dropdown">Start Event</label><div id="start_dropdown" class="start_dropdown"></div></div><div class="col"><label for="end_dropdown">End Event</label><div id="end_dropdown" class="end_dropdown"></div></div><div class="col"><label for="type_dropdown">Additional Visualization</label><select id="type_display_dropdown" data="type"><option value="cluster_color">Cluster Color</option><option value="cluster_outline">Cluster Outline</option><option value="plot">Plot</option><option value="None"></option></select></div><div class="col"><label for="cow_color">Cow Color</label><span class="cow_color"><input type="text" class="cow_color picker" value="" data="color"/></span></div><div class="col"><button type="button" class="btn btn-success duplicate" onclick="duplicate_row(this);fix_picker();"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"></path></svg></button><button type="button" class="btn btn-danger" onclick="delete_row(this);"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-dash" viewBox="0 0 16 16"><path d="M4 8a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 4 8"/></svg></button></div></div></div></div><div class="modal-footer"><button id="data_form_save_but" onclick="process_data_forms();" type="button" class="btn btn-primary">Submit</button></div></div></div></div>
</body>
</html>
